# Spring Boot application properties
server.port=8080

# Database Configuration - Using H2 for local development
spring.datasource.url=jdbc:h2:mem:market_trendz
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# For PostgreSQL (uncomment when ready for production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/market_trendz
# spring.datasource.username=pranay
# spring.datasource.password=pranay
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:test-key}

# MCP Server Configuration
mcp.api.url=${MCP_API_URL:http://localhost:3001}
mcp.api.key=${MCP_API_KEY:}

# External APIs Configuration
external.amazon.api.url=${AMAZON_API_URL:https://api.amazon.com}
external.amazon.api.key=${AMAZON_API_KEY:}
external.junglescout.api.url=${JUNGLESCOUT_API_URL:https://api.junglescout.com}
external.junglescout.api.key=${JUNGLESCOUT_API_KEY:}
external.googletrends.api.url=${GOOGLE_TRENDS_API_URL:https://trends.google.com/api}

# Caching Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# Logging Configuration
logging.level.com.trendz.mvp=INFO
logging.level.org.springframework.web=INFO

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
